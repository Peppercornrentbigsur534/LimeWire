name: Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: python -c "import py_compile; py_compile.compile('LimeWire.py', doraise=True)"

      - name: Import check
        run: python -c "import ast; ast.parse(open('LimeWire.py').read()); print('AST parse OK')"
